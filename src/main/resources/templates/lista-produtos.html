<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Produtos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/produtos}">FATEC - Catálogo</a>
    </div>
</nav>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 mb-0">Lista de Produtos</h1>
        <a th:href="@{/produtos/novo}" class="btn btn-success">Novo Produto</a>
    </div>
    <div class="row mb-4">
        <div class="col-md-6">
            <form th:action="@{/produtos}" method="get" class="d-flex gap-2">
                <input type="text"
                       name="nome"
                       class="form-control"
                       placeholder="Pesquisar por nome..."
                       th:value="${param.nome}">
                <button type="submit" class="btn btn-primary">Buscar</button>
                <a th:href="@{/produtos}" class="btn btn-outline-secondary">Limpar</a>
            </form>
        </div>
    </div>
    <div class="card shadow-sm">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-striped table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>Valor</th>
                        <th class="text-center">Ações</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="p : ${produtos}">
                        <td th:text="${p.idProduto}"></td>
                        <td th:text="${p.nome}"></td>
                        <td th:text="${#numbers.formatDecimal(p.valor, 1, 'POINT', 2, 'COMMA')}"></td>
                        <td class="text-center">
                            <a th:href="@{/produtos/editar/{id}(id=${p.idProduto})}" class="btn btn-warning btn-sm">Editar</a>
                            <a th:href="@{/produtos/excluir/{id}(id=${p.idProduto})}" class="btn btn-danger btn-sm"
                               onclick="return confirm('Deseja realmente excluir este produto?')">Excluir</a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(produtos)}">
                        <td colspan="4" class="text-center text-muted">Nenhum produto cadastrado.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
