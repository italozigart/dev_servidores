<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Produto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/produtos}">FATEC - Catálogo</a>
    </div>
</nav>

<div class="container">
    <div class="card shadow mx-auto" style="max-width: 500px;">
        <div class="card-header bg-white">
            <h2 class="mb-0">Novo Produto</h2>
        </div>
        <div class="card-body">
            <form th:action="@{/produtos/novo}" th:object="${produto}" method="post">
                <div class="mb-3">
                    <label for="nome" class="form-label">Nome do Produto</label>
                    <input type="text" class="form-control" id="nome" th:field="*{nome}" required>
                </div>
                <div class="mb-3">
                    <label for="valor" class="form-label">Valor</label>
                    <input type="number" step="0.01" min="0" class="form-control" id="valor" th:field="*{valor}" required>
                </div>
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-success">Salvar Produto</button>
                    <a th:href="@{/produtos}" class="btn btn-outline-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
